<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Study Arena 全功能版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Chart.js 图表库 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto;}
    .warn { color: red; font-weight:bold; }
    .rank { margin-left:10px; }
    .mvp { color: #cc9900; font-weight: bold; }
    .card { border: 1px solid #ccc; padding: 3px 7px; border-radius: 5px; margin-right: 6px;}
    .task { margin: 5px 0;}
    button { margin:2px 0; }
  </style>
</head>
<body>
  <h1>🎲 考研对决 Study Arena</h1>

  <!-- 段位排行、PK 展示 -->
  <div id="players">
    <!-- JS自动渲染 -->
  </div>
  <!-- 摆烂警告区 -->
  <div id="warnings"></div>
  
  <hr>

  <!-- 连胜/赛季/任务/技能卡展示 -->
  <div>
    <h3>🔥 连胜/赛季/技能卡/任务  </h3>
    <div id="streaks"></div>
    <div id="season"></div>
    <div>本月MVP：<span id="season_mvp"></span></div>
    <div>
      <h4>🎯 每日任务</h4>
      <div id="dailyTasks"></div>
    </div>
    <div>
      <h4>🃏 技能卡系统</h4>
      <div id="cards"></div>
    </div>
  </div>

  <!-- 惩罚展示区 -->
  <div>
    <h3>😈 惩罚区</h3>
    <ul id="punishmentList"></ul>
  </div>

  <hr>
  <!-- 学力曲线图表 -->
  <h3>📈 学力曲线</h3>
  <canvas id="scoreChart" height="120"></canvas>
  <hr>

  <button onclick="forceNewDay()">模拟新一天</button>
  <button onclick="simulateMatch()">模拟比赛（自动PK）</button>
  <button onclick="resetAll()">⚠️ 重置数据</button>

  <script>
  // ========== 全局配置 ==========
  const USERS = ["木一", "pupil"];
  const RANKS = [
    {name:"王者",score:500},
    {name:"钻石",score:300},
    {name:"黄金",score:200},
    {name:"白银",score:100},
    {name:"青铜",score:0}
  ];
  const DAILY_TASKS_POOL = ['复习5道题', '学习30分钟', '脑筋急转弯1道', '查漏补缺1处', '总结知识点1个', '完成随机挑战'];
  const CARD_POOL = ["双倍卡", "护盾卡"];
  // ========== 数据持久化 ==========
  function loadData() {
    let data = localStorage.getItem("arena_data");
    if(data) return JSON.parse(data);
    // 初始化结构
    const today = getToday();
    let initData = {
      users: {},
      season: {month: today.slice(0,7), winner:"", mvp:"", history:[]},
      punishments: [],
      dailyTasks: {},
      dailyDone: {}, // {user:{date:[task,..]}}
      history: {}
    };
    USERS.forEach(name => {
      initData.users[name] = {
        score: 0, 
        streak: 0, 
        lastActive: today, 
        cards: [],
        history: [{date: today, score: 0}],
        mvpCount:0
      };
    });
    saveData(initData);
    return initData;
  }
  function saveData(data) {
    localStorage.setItem("arena_data", JSON.stringify(data));
  }

  // ========== 日期辅助 ==========
  function getToday() {
    return (new Date()).toISOString().slice(0,10);
  }
  function getCurrentMonth() {
    return (new Date()).toISOString().slice(0,7);
  }
  // ========== 段位与积分 ==========
  function getRank(score) {
    for(const r of RANKS) if(score>=r.score) return r.name;
  }
  // ========== UI 渲染 ==========
  function renderAll() {
    let data = loadData();
    renderPlayers(data);
    renderStreaks(data);
    renderWarnings(data);
    renderSeason(data);
    renderDailyTasks(data);
    renderCards(data);
    renderPunishments(data);
    renderChart(data);
    document.getElementById("season_mvp").innerText = data.season.mvp;
  }
  function renderPlayers(data) {
    let html = '';
    USERS.forEach(name=>{
      let u = data.users[name];
      html += `<div>
        <b>${name}</b>
        <span class="rank">🏆${getRank(u.score)}</span>
        <span>分数:<b id="score_${name}">${u.score}</b></span>
        <span id="streak_${name}" style="margin-left:12px;">${u.streak>2?u.streak+'连胜🔥':u.streak+'连胜'}</span>
      </div>`;
    });
    document.getElementById('players').innerHTML = html;
  }
  function renderStreaks(data) {
    let html = '';
    USERS.forEach(name=>{
      let streak = data.users[name].streak;
      if(streak>=3) 
        html+=`<div>${name}: <b>${streak}</b> 连胜🔥</div>`;
    });
    document.getElementById('streaks').innerHTML = html;
  }
  function renderWarnings(data) {
    let today = getToday();
    let html='';
    USERS.forEach(name=>{
      let u = data.users[name];
      let last = new Date(u.lastActive);
      let now = new Date(today);
      let days = (now - last)/(1000*3600*24);
      if(days>=3){
        html += `<div class="warn">${name} 已连续 ${days} 天未学习，⚠️ 摆烂警告+AI通知！</div>`;   
      }
    });
    document.getElementById("warnings").innerHTML = html;
  }
  function renderSeason(data) {
    let m = data.season.month;
    let html = `当前赛季：${m} `;
    if(data.season.winner) html += `上月冠军：${data.season.winner}`;
    html += "<br>赛季历史: " + data.season.history.map(s=>`${s.month}:${s.winner}`).join("; ");
    document.getElementById('season').innerHTML=html;
  }
  function renderDailyTasks(data) {
    let today = getToday();
    let html = '';
    USERS.forEach(name=>{
      let t = data.dailyTasks[name];
      if(!t) return;
      html += `<div>
        <b>${name} 今日任务：</b>
        <ul>`;
      t.forEach(task=>{
        let done = data.dailyDone[name]&&data.dailyDone[name][today]&&data.dailyDone[name][today].includes(task);
        html+=`<li class="task">${task} 
          ${done?"✅":"<button onclick=\"completeTask('"+name+"','"+task+"')\">完成任务</button>" }
        </li>`;
      });
      html +=`</ul></div>`;
    });
    document.getElementById('dailyTasks').innerHTML = html;
  }
  function renderCards(data) {
    let html = '';
    USERS.forEach(name=>{
      let cards = data.users[name].cards || [];
      html+=`<div>${name} 持有卡片: `;
      cards.forEach((c,i)=> {
        html += `<span class="card">${c}</span><button onclick="useCard('${name}',${i})">使用</button>`;
      });
      html+='</div>';
    });
    document.getElementById('cards').innerHTML = html;
  }
  function renderPunishments(data) {
    let html = "";
    data.punishments.forEach(p=>{
      html+=`<li>${p.date} <b>${p.user}</b>：${p.text}</li>`;
    });
    document.getElementById("punishmentList").innerHTML=html;
  }
  // ========== 赛季机制与MVP ==========
  function checkSeasonReset() {
    let data = loadData();
    let m = getCurrentMonth();
    if(data.season.month !== m){
      // 上月MVP = 分高者
      let winner = getSeasonWinner(data);
      data.season.history.push({month: data.season.month, winner});
      data.season.winner = winner;
      data.season.mvp = winner;
      data.season.month = m;
      // 清空分数/连胜/卡片
      USERS.forEach(name=>{
        data.users[name].score = 0;
        data.users[name].streak = 0;
        data.users[name].cards = [];
        data.users[name].history.push({date:getToday(), score: 0});
      });
      // 新发卡/新任务
      generateAllDailyTasks(data);
      distributeWeeklyCards(data);
      saveData(data);
      alert("新赛季开始，所有分数已重置，本月加油！");
      renderAll();
    }
  }
  function getSeasonWinner(data){
    let max = -999, winner='无';
    USERS.forEach(name=>{
      if(data.users[name].score>max){
        max = data.users[name].score;
        winner = name;
      }
    });
    return winner;
  }
  // ========== 每日任务 ==========
  function generateAllDailyTasks(data) {
    USERS.forEach(name=>{
      let pool = [...DAILY_TASKS_POOL];
      data.dailyTasks[name] = [
        pool.splice(Math.random()*pool.length|0,1)[0], 
        pool.splice(Math.random()*pool.length|0,1)[0]
      ];
    });
    saveData(data);
  }
  function completeTask(name, task) {
    let data = loadData();
    let today = getToday();
    if(!data.dailyDone[name]) data.dailyDone[name] = {};
    if(!data.dailyDone[name][today]) data.dailyDone[name][today]=[];
    if(!data.dailyDone[name][today].includes(task)){
      data.dailyDone[name][today].push(task);
      data.users[name].score += 10;
      data.users[name].lastActive = today;
      data.users[name].history.push({date:today,score:data.users[name].score});
      saveData(data);
      alert(`${name} 完成今日任务【${task}】，奖励10分！`);
      renderAll();
    }
  }
  // ========== 技能卡 ==========
  function distributeWeeklyCards(data) {
    USERS.forEach(name=>{
      let card = CARD_POOL[Math.random()*CARD_POOL.length|0];
      data.users[name].cards.push(card);
    });
    saveData(data);
  }
  function useCard(name, idx) {
    let data = loadData();
    let card = data.users[name].cards[idx];
    // 只展示卡效果逻辑
    alert(`${name} 使用了【${card}】！效果生效`);
    data.users[name].cards.splice(idx,1);
    saveData(data);
    renderAll();
  }
  // ========== 惩罚机制  ==========
  function punishLoser(name) {
    let msg = prompt(`${name}，请发一句认输宣言/记录惩罚`);
    if(msg){
      let data = loadData();
      data.punishments.push({user:name, text:msg, date:getToday()});
      saveData(data);
      renderPunishments(data);
    }
  }
  // ========== 模拟比赛PK ==========
  // 随机胜/败&分数&惩罚演示
  function simulateMatch(){
    let data = loadData();
    let win = USERS[Math.random()*2|0], lose = win===USERS[0] ? USERS[1] : USERS[0];
    let double = data.users[win].cards.includes("双倍卡");
    let shield = data.users[lose].cards.includes("护盾卡");
    let award = double ? 20 : 10, penalty = shield? 0 : -5;
    data.users[win].score += award;
    data.users[win].streak += 1;
    data.users[lose].score += penalty;
    data.users[lose].streak = 0;
    data.users[win].lastActive = getToday();
    data.users[lose].lastActive = getToday();
    data.users[win].history.push({date:getToday(),score:data.users[win].score});
    data.users[lose].history.push({date:getToday(),score:data.users[lose].score});
    // 用卡
    if(double) data.users[win].cards = data.users[win].cards.filter(c=>c!=="双倍卡")
    if(shield) data.users[lose].cards = data.users[lose].cards.filter(c=>c!=="护盾卡")
    saveData(data);
    alert(`${win}胜！+${award}分${double?"(双倍卡)":""}\n${lose} ${shield?"护盾卡保护":`-5分并处罚`}！`);
    if(!shield) punishLoser(lose);
    checkSeasonReset();
    renderAll();
  }
  // ========== 曲线图 ==========
  let chartInstance = null;
  function renderChart(data){
    let ctx = document.getElementById("scoreChart").getContext("2d");
    let labels = [];
    let datasets = USERS.map((name,i)=>({
      label:name,
      borderColor: i? "#f70" : "#39f", 
      backgroundColor:"rgba(0,0,0,0)", 
      data:data.users[name].history.map(h=>{
        if(!labels.includes(h.date)) labels.push(h.date);
        return h.score;
      }),
      tension:0.2
    }));
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {labels, datasets},
      options: {responsive:true}
    });
  }
  // ========== 其它操作 ==========
  // 模拟新一天，用于任务、摆烂测试
  function forceNewDay(){
    let data = loadData();
    let today = new Date(getToday());
    today.setDate(today.getDate()+1);
    let fakeToday = today.toISOString().slice(0,10);
    USERS.forEach(name=>{
      data.users[name].lastActive = fakeToday;
      data.users[name].history.push({date:fakeToday,score:data.users[name].score});
    });
    data.dailyTasks = {};
    generateAllDailyTasks(data);
    saveData(data);
    alert("已模拟新的一天, 你可以演示任务/摆烂检测。")
    renderAll();
  }
  function resetAll(){
    if(confirm("确定恢复初始？全部数据会清空！")){
      localStorage.removeItem("arena_data");
      location.reload();
    }
  }
  // ========== 初始化 ==========
  function init() {
    let data = loadData();
    // 首次当天无任务分配
    if(Object.keys(data.dailyTasks).length===0) {
      generateAllDailyTasks(data);
      distributeWeeklyCards(data);
      saveData(data);
    }
    checkSeasonReset();
    renderAll();
  }
  // ========== 启动 ==========
  init();
  </script>
</body>
</html>
